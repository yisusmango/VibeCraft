<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeCraft</title>
  <link rel="stylesheet" href="./styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three":          "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/":  "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>
</head>

<body class="menu-active">

  <div id="main-menu">

    <div class="title-wrapper">
      <h1 class="mc-title">VibeCraft</h1>
      <div class="mc-splash">¡Ahora con nubes volumétricas!</div>
    </div>

    <input type="text" id="username-input" class="mc-input" placeholder="Tu Nombre..." maxlength="16" />

    <nav class="mc-btn-col">
      <button id="btn-singleplayer" class="mc-btn">Singleplayer</button>
      <button id="btn-multiplayer" class="mc-btn">Multiplayer</button>
      <button id="btn-settings" class="mc-btn mc-btn--disabled" disabled>Settings</button>
      <button id="btn-upload-skin" class="mc-btn">Cambiar Skin</button>
      <input type="file" id="skin-input" accept="image/png" style="display:none;">
    </nav>

    <div id="world-manager" style="display:none;">
      <h2 class="wm-title">Seleccionar Mundo</h2>

      <div id="worlds-list">
        </div>

      <div class="wm-actions">
        <button id="btn-world-new"    class="mc-btn mc-btn--sm">Crear Nuevo</button>
        <button id="btn-world-import" class="mc-btn mc-btn--sm mc-btn--disabled" disabled>Importar</button>
        <button id="btn-world-back"   class="mc-btn mc-btn--sm">Volver</button>
      </div>
    </div>

    <p class="mc-version">VibeCraft Alpha · Three.js r158</p>
  </div>

  <div id="crosshair"></div>

  <div id="hud">
    X: <span id="hx">0.0</span>
    Y: <span id="hy">0.0</span>
    Z: <span id="hz">0.0</span>
    &nbsp;|&nbsp; Bloques: <span id="hb">0</span>
  </div>

  <div id="block-info">
    <div class="label">Bloque apuntado</div>
    <div class="value" id="bi">—</div>
  </div>

  <div id="dev-tools">
    <div class="dev-label">⚙ Dev Tools</div>
    <div class="dev-row">
      <button class="dev-btn" data-phase="dawn"    >🌅 Alba</button>
      <button class="dev-btn" data-phase="noon"    >☀ Día</button>
      <button class="dev-btn" data-phase="dusk"    >🌇 Tarde</button>
      <button class="dev-btn" data-phase="midnight">🌙 Noche</button>
    </div>
  </div>

  <div id="state">
    VY: <span id="svy">0.00</span> &nbsp; Suelo: <span id="sg">—</span>
  </div>

  <div id="overlay">
    <h1>Menú del Juego</h1>
    <div class="mc-btn-col">
      <button id="btn-resume"  class="mc-btn">Volver al juego</button>
      <button id="btn-options" class="mc-btn mc-btn--disabled" disabled>Opciones…</button>
      <button id="btn-quit"    class="mc-btn">Guardar y salir al menú principal</button>
    </div>
  </div>

  <div id="hotbar"></div>

  <div id="chat-container" style="display: flex; position: absolute; bottom: 20px; left: 20px; z-index: 1000; flex-direction: column; gap: 5px; width: 400px; pointer-events: none;">
    <div id="chat-messages" style="max-height: 200px; overflow-y: auto; color: white; text-shadow: 1px 1px 0 #000; font-family: 'Courier New', monospace; font-size: 14px; pointer-events: auto;"></div>
    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="64" style="display: none; padding: 5px; font-family: 'Courier New', monospace; background: rgba(0,0,0,0.6); color: white; border: 1px solid #555; outline: none; pointer-events: auto;" />
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       🎒  INVENTORY OVERLAY — Creative Mode Inventory
       Estructura:
         • #inventory-overlay  → fondo oscuro semitransparente (z: 600)
         • #inventory-panel    → panel central estilo MC (gris #c6c6c6)
           ├─ .inv-panel-title   → título "Inventario Creativo"
           ├─ .inv-section-label → "Catálogo de Bloques"
           ├─ #creative-catalog  → grid scrollable, read-only, todos los MATERIALS
           ├─ .inv-section-label → "Inventario"
           ├─ #inv-main-grid     → 9×3 = slots 9..35 (inventario interno)
           ├─ .inv-sep           → separador visual entre inventario y hotbar
           └─ #inv-hotbar-grid   → 9×1 = slots 0..8 (refleja el hotbar del HUD)
       Todos los slots .inv-slot se generan y gestionan desde ui.js.
       ═══════════════════════════════════════════════════════════════ -->
  <div id="inventory-overlay">
    <div id="inventory-panel">

      <div class="inv-panel-title">Inventario Creativo</div>

      <div class="inv-section-label">Catálogo de Bloques</div>
      <div id="creative-catalog"></div>

      <div class="inv-section-label">Inventario</div>
      <div id="inv-main-grid"></div>

      <div class="inv-sep"></div>

      <div id="inv-hotbar-grid"></div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       🖱️  CURSOR ITEM — El bloque "pegado" al ratón durante el drag.
       • position: fixed  → se posiciona en coordenadas de viewport
       • pointer-events: none → los clics pasan a través hacia los slots
       • z-index: 1000    → siempre encima de todo, incluyendo el panel
       Su contenido (un <canvas>) se inyecta y actualiza desde ui.js.
       ═══════════════════════════════════════════════════════════════ -->
  <div id="cursor-item"></div>

  <script type="module" src="./src/main.js"></script>

</body>
</html>
